name: Java CI with Docker Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Enables the "Run workflow" button in the Actions tab
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        # 'verify' runs all tests and checks the package integrity
        run: mvn clean verify

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: iso8583-adapter:latest
          # Speeds up Docker build by caching layers in GitHub Actions
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Image Build
        run: |
          docker images
          docker inspect --format='{{.Architecture}} {{.Os}}' iso8583-adapter:latest
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'iso8583-adapter:latest'
          format: 'table'
          exit-code: '1' # This will fail the build if high/critical vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'