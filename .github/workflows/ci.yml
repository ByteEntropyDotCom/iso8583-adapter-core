name: Java CI with Docker Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Build with Maven (Runs Unit & Integration Tests)
      - name: Build and Test with Maven
        run: mvn clean install

      # 4. Set up Docker Buildx
      # This is the modern way to build images in GitHub Actions
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build Docker Image (No Push)
      # We set 'push: false' and 'load: true' to keep it local to the runner
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: iso8583-adapter:latest
          # 'load: true' saves the image to the local Docker store on the runner 
          # so it's fully verified, but then it's discarded when the job ends.
          load: true

      # 6. Verify Docker Image exists on the runner
      - name: Verify Image Build
        run: docker images | grep iso8583-adapter
