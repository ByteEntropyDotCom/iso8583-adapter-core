# ===================================================================
# ISO 8583 ADAPTER CORE - PRODUCTION CONFIGURATION
# ===================================================================
spring.application.name=iso8583-adapter-core
adapter.server.port=8080

# --- Protocol Wiring (Critical for Decoder/Handler) ---
# Set to 'true' if the MTI is 2 bytes BCD. 'false' if 4 bytes ASCII.
adapter.protocol.mti-binary=false
# Set to 'true' if the Bitmap is 8/16 bytes raw. 'false' if 16/32 hex chars.
adapter.protocol.bitmap-binary=true
# Path to your JSON schema
adapter.schema.file=iso-schema.json

# --- Tokenizer Vault Integration ---
adapter.vault.enabled=false
adapter.vault.url=http://tokenizer-vault-core:8081/v1/process
adapter.vault.timeout-ms=80
# Field used for PAN (Tokenization target)
adapter.map.field.pan=2

# --- Performance & Debugging ---
adapter.netty.leak-detection-level=SIMPLE

# --- Business Validation Rules ---
adapter.business.allowed-mtis=0100,0200,0800
# Supports dot notation for subfields (e.g., 48.1)
adapter.business.mandatory-fields=3,11,41

# --- MTI Response Mapping ---
# Maps Request MTI -> Response MTI
adapter.mti.map.0100=0110
adapter.mti.map.0200=0210
adapter.mti.map.0800=0810

# --- Security & MAC Settings ---
adapter.security.mac-enabled=true
adapter.security.mac-algorithm=HmacSHA256
adapter.security.mac-key=${MAC_KEY:super-secret-key-12345}
adapter.security.mac-field=128
adapter.security.mac-length=64
adapter.security.strict-mode=true

# --- SLAs & Timeouts ---
adapter.timeout.total-threshold-ms=180

# --- Response Codes ---
adapter.response.system-error-code=96
adapter.response.mac-error-code=A0
adapter.map.field.response-code=39

# Options: RIGHT_ZERO (Default/Modern), LEFT_F (Legacy/Mainframe)
adapter.protocol.bcd-padding=RIGHT_ZERO